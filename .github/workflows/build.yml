name: build-ffmpeg
on:
  workflow_dispatch:
    inputs:
      linux_setup:
        description: 'Linux setup script'
        type: string
        default: linux-osx-setup.sh
      linux_build:
        description: 'Linux build script'
        type: string
        default: ffmpeg-8.1-rhel9-build.sh
      windows_setup:
        description: 'Windows setup script'
        type: string
        default: windows-setup.sh
      windows_build:
        description: 'Windows build script'
        type: string
        default: ffmpeg-8.1-windows-build.sh
      skip_linux:
        description: 'Skip Linux build'
        type: boolean
        default: false
      skip_windows:
        description: 'Skip Windows build'
        type: boolean
        default: false
      linux_runner:
        description: 'Linux runner label'
        type: string
        default: ubuntu-latest
      windows_runner:
        description: 'Windows runner label'
        type: string
        default: windows-latest
      tag_prefix:
        description: 'Release tag prefix'
        type: string
        default: build-

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.r.outputs.sha }}
      tag: ${{ steps.r.outputs.tag }}
    steps:
      - id: r
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api repos/AcademySoftwareFoundation/EncodingGuidelines/commits/main --jq .sha)
          SHORT=${SHA:0:7}
          DATE=$(date -u +%Y%m%d)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "tag=${{ inputs.tag_prefix }}${DATE}-${SHORT}" >> $GITHUB_OUTPUT

  configure:
    needs: resolve
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          entries=()
          if [ "${{ inputs.skip_linux }}" != "true" ]; then
            entries+=('{"platform":"linux","runner":"${{ inputs.linux_runner }}","setup":"${{ inputs.linux_setup }}","build":"${{ inputs.linux_build }}","shell":"bash","src_dir":"build-rhel9/full_deploy","artifact_name":"ffmpeg-linux-x86_64"}')
          fi
          if [ "${{ inputs.skip_windows }}" != "true" ]; then
            entries+=('{"platform":"windows","runner":"${{ inputs.windows_runner }}","setup":"${{ inputs.windows_setup }}","build":"${{ inputs.windows_build }}","shell":"msys2 {0}","src_dir":"build-windows/full_deploy","artifact_name":"ffmpeg-windows-x86_64"}')
          fi
          if [ ${#entries[@]} -eq 0 ]; then
            MATRIX_JSON='{"include":[]}'
          else
            MATRIX_JSON=$(printf "%s\n" "${entries[@]}" | jq -sc '. | {include: .}')
          fi
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  build:
    needs: [resolve, configure]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.configure.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: AcademySoftwareFoundation/EncodingGuidelines
          ref: ${{ needs.resolve.outputs.sha }}

      - name: workflow config
        shell: bash
        run: |
          echo "Platform     : ${{ matrix.platform }}"
          echo "Runner       : ${{ matrix.runner }}"
          echo "Setup script : ${{ matrix.setup }}"
          echo "Build script : ${{ matrix.build }}"
          echo "Shell        : ${{ matrix.shell }}"
          echo "Src dir      : ${{ matrix.src_dir }}"
          echo "Artifact     : ${{ matrix.artifact_name }}"

      - if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: git make mingw-w64-x86_64-toolchain mingw-w64-x86_64-python

      - uses: astral-sh/setup-uv@v5
        if: matrix.platform != 'windows'
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Create venv (Linux)
        if: matrix.platform != 'windows'
        working-directory: conan
        run: uv venv --seed

      - name: Create venv (Windows)
        if: matrix.platform == 'windows'
        working-directory: conan
        run: python -m venv .venv

      - name: Configure Conan package manager sudo
        if: matrix.platform == 'linux'
        run: |
          mkdir -p ~/.conan2
          echo "tools.system.package_manager:sudo=True" >> ~/.conan2/global.conf

      - name: Install system nasm
        # Upstream libvmaf recipe comments out nasm in build_requirements, but
        # meson still demands it. Workaround until upstream enables it.
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Build ffmpeg
        working-directory: conan
        run: |
          if [ -f .venv/bin/activate ]; then
            source .venv/bin/activate
          else
            source .venv/Scripts/activate
          fi
          which python && which pip3
          if [ "${{ matrix.platform }}" = "windows" ]; then
            sed -i '/--noconfirm/!s/pacman -S /pacman -S --noconfirm /' ./${{ matrix.setup }}
            sed -i 's/\r$//' ./${{ matrix.setup }}
            sed -i 's/\r$//' ./${{ matrix.build }}
          fi
          source ./${{ matrix.setup }}
          source ./${{ matrix.build }}

      - name: Package build
        working-directory: conan
        shell: bash
        run: |
          NAME="${{ matrix.artifact_name }}"
          SRC="${{ matrix.src_dir }}"
          if [ "${{ matrix.platform }}" = "windows" ]; then
            7z a "${NAME}.zip" "./${SRC}/*"
          else
            (cd "$SRC" && zip -r "../../${NAME}.zip" .)
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: conan/${{ matrix.artifact_name }}.zip
          if-no-files-found: error
          retention-days: 30

  release:
    needs: [resolve, build]
    if: always() && needs.resolve.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.zip > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: ${{ needs.resolve.outputs.tag }}
          body: |
            Built from AcademySoftwareFoundation/EncodingGuidelines @ `${{ needs.resolve.outputs.sha }}`
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
