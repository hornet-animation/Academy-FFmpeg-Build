name: build-ffmpeg
on:
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.r.outputs.sha }}
      tag: ${{ steps.r.outputs.tag }}
    steps:
      - id: r
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api repos/AcademySoftwareFoundation/EncodingGuidelines/commits/main --jq .sha)
          SHORT=${SHA:0:7}
          DATE=$(date -u +%Y%m%d)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "tag=build-${DATE}-${SHORT}" >> $GITHUB_OUTPUT

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            setup: linux-osx-setup.sh
            build: ffmpeg-8.1-rhel9-build.sh
            shell: bash
            src_dir: build-rhel9/full_deploy
            artifact_name: ffmpeg-linux-x86_64
          - os: windows-latest
            setup: windows-setup.sh
            build: ffmpeg-8.1-windows-build.sh
            shell: 'C:\msys64\usr\bin\bash.exe -leo pipefail {0}'
            src_dir: build-windows/full_deploy
            artifact_name: ffmpeg-windows-x86_64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    env:
      MSYSTEM: MINGW64
      MSYS2_PATH_TYPE: minimal
      CHERE_INVOKING: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: AcademySoftwareFoundation/EncodingGuidelines
          ref: ${{ needs.resolve.outputs.sha }}

      - if: matrix.os == 'windows-latest'
        name: Install MSYS2 packages (pre-installed C:\msys64)
        run: |
          pacman -Sy --noconfirm
          pacman -S --noconfirm --needed git make mingw-w64-x86_64-toolchain mingw-w64-x86_64-python

      - if: matrix.os == 'windows-latest'
        name: Configure Conan serial jobs for Windows
        # CONAN_HOME must live on the same drive as the workspace (D:) — the
        # full_deploy deployer calls os.path.relpath(file, package_folder),
        # which raises ValueError on Windows when the two are on different drives.
        run: |
          mkdir -p /d/.c2
          echo 'tools.build:jobs=1' >> /d/.c2/global.conf

      - uses: astral-sh/setup-uv@v5
        if: matrix.os != 'windows-latest'
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Create venv (Linux)
        if: matrix.os != 'windows-latest'
        working-directory: conan
        run: uv venv --seed

      - name: Create venv (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: conan
        run: python -m venv .venv

      - name: Configure Conan package manager sudo
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p ~/.conan2
          echo "tools.system.package_manager:sudo=True" >> ~/.conan2/global.conf

      - name: Install system nasm + patchelf
        # nasm: libvmaf meson still demands it despite recipe comment-out.
        # patchelf: required by create-linux-bundle.sh to set $ORIGIN/../lib RUNPATH.
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y nasm patchelf

      - name: Build ffmpeg
        working-directory: conan
        env:
          LC_ALL: C.UTF-8
        run: |
          if [ -f .venv/bin/activate ]; then
            source .venv/bin/activate
          else
            source .venv/Scripts/activate
          fi
          which python && which pip3
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            sed -i '/--noconfirm/!s/pacman -S /pacman -S --noconfirm /' ./${{ matrix.setup }}
            sed -i 's/\r$//' ./${{ matrix.setup }}
            sed -i 's/\r$//' ./${{ matrix.build }}
            # Conan cache must share the workspace drive (D:) — see workflow comment above.
            sed -i 's|/c/.c2|/d/.c2|g' ./${{ matrix.setup }} ./${{ matrix.build }}
          fi
          source ./${{ matrix.setup }}
          source ./${{ matrix.build }}

      - name: Bundle Windows standalone (collect mingw runtime DLLs)
        if: matrix.os == 'windows-latest'
        working-directory: conan
        run: |
          set -euo pipefail
          ./create-windows-bundle.sh build-windows/full_deploy/host ffmpeg-windows-standalone
          # second pass: pull transitive mingw deps that the first pass may have missed
          cd ffmpeg-windows-standalone
          for f in *.exe *.dll; do
            [ -f "$f" ] || continue
            ldd "$f"
          done | awk '/=> \// {print $3}' | sort -u \
            | grep -E '/(mingw64|ucrt64)/bin/' \
            | xargs -I{} cp -n {} . || true
          echo "=== final bundle contents ==="
          ls -la

      - name: Bundle Linux standalone (collect .so deps + patchelf RUNPATH)
        if: matrix.os == 'ubuntu-latest'
        working-directory: conan
        run: |
          set -euo pipefail
          bash create-linux-bundle.sh build-rhel9/full_deploy/host ffmpeg-linux-standalone
          echo "=== bundle layout ==="
          find ffmpeg-linux-standalone -maxdepth 2 -mindepth 1 | sort
          echo "=== ffmpeg RUNPATH ==="
          patchelf --print-rpath ffmpeg-linux-standalone/bin/ffmpeg || true
          echo "=== unresolved deps after bundling (should be only system libs) ==="
          LD_LIBRARY_PATH=ffmpeg-linux-standalone/lib ldd ffmpeg-linux-standalone/bin/ffmpeg \
            | (grep "not found" || true)

      - name: Package build
        working-directory: conan
        shell: bash
        run: |
          NAME="${{ matrix.artifact_name }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            (cd ffmpeg-windows-standalone && 7z a "../${NAME}.zip" "./*")
          else
            (cd ffmpeg-linux-standalone && zip -r "../${NAME}.zip" .)
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: conan/${{ matrix.artifact_name }}.zip
          if-no-files-found: error
          retention-days: 30

  release:
    needs: [resolve, build]
    if: always() && needs.resolve.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.zip > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: ${{ needs.resolve.outputs.tag }}
          body: |
            Built from AcademySoftwareFoundation/EncodingGuidelines @ `${{ needs.resolve.outputs.sha }}`
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
