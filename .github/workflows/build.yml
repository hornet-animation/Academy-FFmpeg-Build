name: build-ffmpeg
on:
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.r.outputs.sha }}
      tag: ${{ steps.r.outputs.tag }}
    steps:
      - id: r
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api repos/AcademySoftwareFoundation/EncodingGuidelines/commits/main --jq .sha)
          SHORT=${SHA:0:7}
          DATE=$(date -u +%Y%m%d)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "tag=build-${DATE}-${SHORT}" >> $GITHUB_OUTPUT

  # -----------------------------------------------------------------------
  # LINUX BUILD -- split out of the old matrix and run inside an actual
  # rockylinux:9 container, so the resulting binary links against RHEL 9's
  # glibc (2.34) instead of whatever the bare ubuntu-latest host ships
  # (Ubuntu 24.04 => glibc 2.39). This is the actual fix for:
  #   ./ffmpeg: /lib64/libc.so.6: version `GLIBC_2.38' not found
  # -----------------------------------------------------------------------
  build-linux:
    needs: resolve
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9
    steps:
      - name: Install base toolchain (git/tar/python/compilers/nasm/patchelf)
        # Minimal rockylinux:9 image lacks most of this -- actions/checkout
        # needs git+tar, Conan needs a compiler toolchain, and nasm/patchelf
        # are the same two extras the original workflow installed via apt.
        run: |
          dnf install -y dnf-plugins-core
          dnf config-manager --set-enabled crb
          dnf install -y epel-release
          dnf groupinstall -y "Development Tools"
          dnf install -y git tar which zip unzip python3 python3-pip nasm patchelf

      - name: Shim sudo
        # Container already runs as root, but some Conan system_requirements()
        # hooks (e.g. vaapi/system) unconditionally shell out to `sudo dnf ...`,
        # and this base image has no sudo binary at all -- provide a no-op passthrough.
        run: |
          printf '#!/bin/sh\nexec "$@"\n' > /usr/bin/sudo
          chmod +x /usr/bin/sudo

      - uses: actions/checkout@v4
        with:
          repository: AcademySoftwareFoundation/EncodingGuidelines
          ref: ${{ needs.resolve.outputs.sha }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Create venv
        working-directory: conan
        run: uv venv --seed

      - name: Configure Conan package manager sudo
        run: |
          mkdir -p ~/.conan2
          echo "tools.system.package_manager:sudo=True" >> ~/.conan2/global.conf

      - name: Build ffmpeg
        working-directory: conan
        env:
          LC_ALL: C.UTF-8
        run: |
          source .venv/bin/activate
          which python && which pip3
          source ./linux-osx-setup.sh
          source ./ffmpeg-8.1-rhel9-build.sh

      - name: Bundle Linux standalone (collect .so deps + patchelf RUNPATH)
        working-directory: conan
        run: |
          set -euo pipefail
          bash create-linux-bundle.sh build-rhel9/full_deploy/host ffmpeg-linux-standalone
          echo "=== bundle layout ==="
          find ffmpeg-linux-standalone -maxdepth 2 -mindepth 1 | sort
          echo "=== ffmpeg RUNPATH ==="
          patchelf --print-rpath ffmpeg-linux-standalone/bin/ffmpeg || true
          echo "=== unresolved deps after bundling (should be only glibc/libstdc++/ld-linux) ==="
          LD_LIBRARY_PATH=ffmpeg-linux-standalone/lib ldd ffmpeg-linux-standalone/bin/ffmpeg \
            | (grep "not found" || true)
          echo "=== glibc/glibcxx versions this binary actually requires ==="
          strings ffmpeg-linux-standalone/bin/ffmpeg | grep -oE 'GLIBC_[0-9.]+' | sort -V | uniq | tail -5
          strings ffmpeg-linux-standalone/bin/ffmpeg | grep -oE 'GLIBCXX_[0-9.]+' | sort -V | uniq | tail -5

      - name: Package build
        working-directory: conan
        run: |
          (cd ffmpeg-linux-standalone && zip -r "../ffmpeg-linux-x86_64.zip" .)

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-x86_64
          path: conan/ffmpeg-linux-x86_64.zip
          if-no-files-found: error
          retention-days: 30

  # -----------------------------------------------------------------------
  # WINDOWS BUILD -- unchanged from the original matrix leg, just pulled
  # out into its own job now that Linux has its own container-based job.
  # -----------------------------------------------------------------------
  build-windows:
    needs: resolve
    runs-on: windows-latest
    defaults:
      run:
        shell: 'C:\msys64\usr\bin\bash.exe -leo pipefail {0}'
    env:
      MSYSTEM: MINGW64
      MSYS2_PATH_TYPE: minimal
      CHERE_INVOKING: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: AcademySoftwareFoundation/EncodingGuidelines
          ref: ${{ needs.resolve.outputs.sha }}

      - name: Install MSYS2 packages (pre-installed C:\msys64)
        run: |
          pacman -Sy --noconfirm
          pacman -S --noconfirm --needed git make mingw-w64-x86_64-toolchain mingw-w64-x86_64-python

      - name: Configure Conan serial jobs for Windows
        # CONAN_HOME must live on the same drive as the workspace (D:) -- the
        # full_deploy deployer calls os.path.relpath(file, package_folder),
        # which raises ValueError on Windows when the two are on different drives.
        run: |
          mkdir -p /d/.c2
          echo 'tools.build:jobs=1' >> /d/.c2/global.conf

      - name: Create venv (Windows)
        working-directory: conan
        run: python -m venv .venv

      - name: Build ffmpeg
        working-directory: conan
        env:
          LC_ALL: C.UTF-8
        run: |
          if [ -f .venv/bin/activate ]; then
            source .venv/bin/activate
          else
            source .venv/Scripts/activate
          fi
          which python && which pip3
          sed -i '/--noconfirm/!s/pacman -S /pacman -S --noconfirm /' ./windows-setup.sh
          sed -i 's/\r$//' ./windows-setup.sh
          sed -i 's/\r$//' ./ffmpeg-8.1-windows-build.sh
          # Conan cache must share the workspace drive (D:) -- see comment above.
          sed -i 's|/c/.c2|/d/.c2|g' ./windows-setup.sh ./ffmpeg-8.1-windows-build.sh
          source ./windows-setup.sh
          source ./ffmpeg-8.1-windows-build.sh

      - name: Bundle Windows standalone (collect mingw runtime DLLs)
        working-directory: conan
        run: |
          ./create-windows-bundle.sh build-windows/full_deploy/host ffmpeg-windows-standalone
          # second pass: pull transitive mingw deps that the first pass may have missed
          cd ffmpeg-windows-standalone
          for f in *.exe *.dll; do
            [ -f "$f" ] || continue
            ldd "$f"
          done | awk '/=> \// {print $3}' | sort -u \
            | grep -E '/(mingw64|ucrt64)/bin/' \
            | xargs -I{} cp -n {} . || true
          echo "=== final bundle contents ==="
          ls -la

      - name: Package build
        working-directory: conan
        shell: bash
        run: |
          (cd ffmpeg-windows-standalone && 7z a "../ffmpeg-windows-x86_64.zip" "./*")

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows-x86_64
          path: conan/ffmpeg-windows-x86_64.zip
          if-no-files-found: error
          retention-days: 30

  release:
    needs: [resolve, build-linux, build-windows]
    if: always() && needs.resolve.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.zip > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: ${{ needs.resolve.outputs.tag }}
          body: |
            Built from AcademySoftwareFoundation/EncodingGuidelines @ `${{ needs.resolve.outputs.sha }}`
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
